name: Unit tests

# Fast feedback path: no Docker, no external services. Runs the plain
# `go test ./...`, which skips packages that have build tags
# (integration, e2e) and finishes in seconds.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Download dependencies
        run: go mod download
        env:
          GOTOOLCHAIN: auto

      - name: Run unit tests
        run: go test -v ./...
        env:
          GOTOOLCHAIN: auto
