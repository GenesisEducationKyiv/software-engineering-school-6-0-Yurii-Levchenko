name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download
        env:
          GOTOOLCHAIN: auto

      - name: Build
        run: go build -v ./...
        env:
          GOTOOLCHAIN: auto

      - name: Run tests
        run: go test -v ./internal/service/...
        env:
          GOTOOLCHAIN: auto

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
        env:
          GOTOOLCHAIN: auto
